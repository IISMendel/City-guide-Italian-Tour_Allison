                  { icon: <Ticket className="w-4 h-4"/>, title: "Ticket Validation", text: "If you have a physical paper ticket for a regional train, you MUST validate it at the yellow machines before boarding. E-tickets just need QR code scan." },

            </div>

          <footer className="text-center py-10 text-stone-400 text-sm mt-4">

            <p className="mt-1">Buon viaggio, Allison & friends! 🚂</p>
          </footer>

        </div>
      );
    }
